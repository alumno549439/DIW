<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Layout con Bootstrap</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0-beta.2/css/bootstrap.min.css">

    <!-- CSS propio -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container-fluid">

    <div class="row">
        <div class="col-md-6 box pink"></div>
        <div class="col-md-6 box sky"></div>
    </div>

    <div class="row">
        <div class="col-md-3 box yellow"></div>
        <div class="col-md-6 box green"></div>
        <div class="col-md-3 box purple"></div>
    </div>

    <div class="row">
        <div class="col-md-4 box orange"></div>
        <div class="col-md-4 box blue"></div>
        <div class="col-md-4 box red"></div>
    </div>

    <div class="row">
        <div class="col-12 box dark"></div>
    </div>

</div>

</body>
</html>
